name: Reproducible Build

on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name for the uploaded artifact'
        required: false
        default: 'app-release-unsigned'
        type: string
      upload-artifact:
        description: 'Upload the unsigned APK as an artifact'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove F-Droid-scanned binaries
        run: |
          rm -rf node_modules/sass-embedded node_modules/.pnpm/sass-embedded*
          rm -f node_modules/.pnpm/source-map@*/node_modules/source-map/lib/mappings.wasm

      - name: Set SOURCE_DATE_EPOCH
        id: source_date
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Build Android release APK (unsigned)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.source_date.outputs.epoch }}
        run: pnpm android:build:release

      - name: Strip signing for comparison
        run: |
          mkdir -p unsigned-apk
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk unsigned-apk/app-release-unsigned.apk || \
          cp android/app/build/outputs/apk/release/app-release.apk unsigned-apk/app-release-unsigned.apk

      - name: Upload unsigned APK
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: unsigned-apk/app-release-unsigned.apk
          if-no-files-found: error
