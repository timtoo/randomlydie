name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reproducible-build.yml
    with:
      artifact-name: app-release-unsigned
      upload-artifact: true

  verify:
    needs: build
    uses: ./.github/workflows/reproducible-build.yml
    with:
      artifact-name: app-release-unsigned-verify
      upload-artifact: true

  compare:
    needs: [build, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned APKs
        uses: actions/download-artifact@v4
        with:
          path: apks
          pattern: app-release-unsigned*

      - name: Compare APKs
        run: |
          find apks -name '*.apk' -exec sha256sum {} \;
          APK_A=$(find apks -name '*.apk' | head -n1)
          APK_B=$(find apks -name '*.apk' | tail -n1)
          diff -q "$APK_A" "$APK_B"

  build-pwa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            src-pwa/pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          cd src-pwa && pnpm install --frozen-lockfile

      - name: Build PWA
        run: pnpm quasar build -m pwa

      - name: Zip PWA
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cd dist/pwa
          zip -r "../../randomlydie-pwa-${VERSION}.zip" .

      - name: Upload PWA archive
        uses: actions/upload-artifact@v4
        with:
          name: randomlydie-pwa
          path: randomlydie-pwa-*.zip
          if-no-files-found: error

  sign-and-release:
    needs: [compare, build-pwa]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download unsigned APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-unsigned
          path: unsigned-apk

      - name: Download PWA archive
        uses: actions/download-artifact@v4
        with:
          name: randomlydie-pwa
          path: pwa-zip

      - name: Decode keystore and sign APK
        env:
          ANDROID_RELEASE_KEYSTORE: ${{ secrets.ANDROID_RELEASE_KEYSTORE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_RELEASE_KEYSTORE" | base64 -d > release.keystore
          UNSIGNED_APK=$(find unsigned-apk -name '*.apk' | head -n1)
          SIGNED_APK=randomlydie.apk
          BUILD_TOOLS=$(ls -1 ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -n1)
          APKSIGNER=${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner
          "$APKSIGNER" sign \
            --alignment-preserved \
            --ks release.keystore \
            --ks-pass pass:"$RELEASE_STORE_PASSWORD" \
            --key-pass pass:"$RELEASE_KEY_PASSWORD" \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          rm release.keystore

      - name: Rename signed APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv randomlydie.apk "randomlydie-${VERSION}.apk"

      - name: Move PWA archive to root
        run: mv pwa-zip/randomlydie-pwa-*.zip .

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: randomlydie-release
          path: randomlydie-*.apk
          if-no-files-found: error

      - name: Attach APK and PWA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            randomlydie-*.apk
            randomlydie-pwa-*.zip
