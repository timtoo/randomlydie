name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.18.0
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Setup JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write release signing config
        env:
          ANDROID_RELEASE_KEYSTORE: ${{ secrets.ANDROID_RELEASE_KEYSTORE }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_RELEASE_KEYSTORE" ]; then
            printf '%s' "$ANDROID_RELEASE_KEYSTORE" | base64 -d > android/app/release.keystore
          fi
          cat > android/local.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          EOF

      - name: Build Android release APK
        run: pnpm android:build:release

      - name: Rename release APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/app-release.apk "randomlydie-test-signed-${VERSION}.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: randomlydie-test-release
          path: randomlydie-*.apk
          if-no-files-found: error

